data:
  # FlowBench 2D LDC (NS) .npz files
  file_path_train_x: /work/mech-ai/arabeh/data_prep_ns/LDC_NS_2D/processed/easy/all_ldc_train_x.npz
  file_path_train_y: /work/mech-ai/arabeh/data_prep_ns/LDC_NS_2D/processed/easy/all_ldc_train_y.npz
  file_path_test_x: /work/mech-ai/arabeh/data_prep_ns/LDC_NS_2D/processed/easy/all_ldc_test_x.npz
  file_path_test_y: /work/mech-ai/arabeh/data_prep_ns/LDC_NS_2D/processed/easy/all_ldc_test_y.npz
  resolution: 256        # fields are bilinearly resized from 512 to this
  batch_size: 16
  groups_per_batch: 4    # geometry groups per batch (used when lambda_inv > 0)
  num_workers: 6

model:
  base_channels: 32
  latent_mu: 4           # regime block (log Re lives here)
  latent_g: 32           # geometry block (object shape lives here)
  latent_xi: 16          # residual block
  sdf_resolution: 64     # resolution of the SDF reconstructed from z_g
  static_geometry: false # true: z_g from a dedicated SDF encoder (Re-invariant by construction)
  lambda_recon: 1.0
  lambda_regime: 0.1
  lambda_geo: 0.1
  lambda_decorr: 0.01    # back to run-1 value so run 4 isolates the L10 effect
  lambda_inv: 0.1        # L10 same-factor invariance of z_g within geometry groups
  lambda_swap: 0.1       # L12 swap consistency: z_mu recombinable across geometries at same Re
  lambda_xswap: 0.1      # cross-Re swap: z_mu must transfer a geometry to a new Re (run 6)
  lr: 0.001

trainer:
  project: compositional
  wandb: false           # set true to log to Weights & Biases
  accelerator: auto
  devices: 1
  max_epochs: 200
  log_every_n_steps: 10
  seed: 0

callbacks:
  checkpoint:
    dirpath: ./checkpoints/compositional
    filename: cae-{epoch:03d}
    monitor: val_loss_full
    mode: min
    save_top_k: 1
